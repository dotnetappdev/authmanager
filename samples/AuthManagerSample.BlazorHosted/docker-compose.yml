version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: authmanager
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authmanager_dev
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  db-data:
